<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 FIFA 월드컵 시뮬레이터</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .animate-fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-gray-800 pb-20">

    <!-- App Container -->
    <div id="app"></div>

    <script>
        // --- 데이터 정의 ---
        const teamData = {
            '아르헨티나': { code: 'ar', rank: 1 }, '프랑스': { code: 'fr', rank: 2 }, '벨기에': { code: 'be', rank: 3 }, '잉글랜드': { code: 'gb-eng', rank: 4 },
            '브라질': { code: 'br', rank: 5 }, '포르투갈': { code: 'pt', rank: 6 }, '네덜란드': { code: 'nl', rank: 7 }, '스페인': { code: 'es', rank: 8 },
            '이탈리아': { code: 'it', rank: 9 }, '크로아티아': { code: 'hr', rank: 10 }, '미국': { code: 'us', rank: 11 }, '콜롬비아': { code: 'co', rank: 12 },
            '모로코': { code: 'ma', rank: 13 }, '멕시코': { code: 'mx', rank: 14 }, '우루과이': { code: 'uy', rank: 15 }, '독일': { code: 'de', rank: 16 },
            '세네갈': { code: 'sn', rank: 17 }, '일본': { code: 'jp', rank: 18 }, '스위스': { code: 'ch', rank: 19 }, '이란': { code: 'ir', rank: 20 },
            '대한민국': { code: 'kr', rank: 23 }, '호주': { code: 'au', rank: 24 }, '오스트리아': { code: 'at', rank: 25 }, '우크라이나': { code: 'ua', rank: 22 },
            '스웨덴': { code: 'se', rank: 27 }, '폴란드': { code: 'pl', rank: 28 }, '웨일스': { code: 'gb-wls', rank: 29 }, '나이지리아': { code: 'ng', rank: 30 },
            '에콰도르': { code: 'ec', rank: 31 }, '페루': { code: 'pe', rank: 32 }, '세르비아': { code: 'rs', rank: 33 }, '카타르': { code: 'qa', rank: 34 },
            '체코': { code: 'cz', rank: 36 }, '이집트': { code: 'eg', rank: 37 }, '코트디부아르': { code: 'ci', rank: 38 }, '스코틀랜드': { code: 'gb-sct', rank: 39 },
            '튀르키예': { code: 'tr', rank: 40 }, '튀니지': { code: 'tn', rank: 41 }, '알제리': { code: 'dz', rank: 43 }, '노르웨이': { code: 'no', rank: 47 },
            '캐나다': { code: 'ca', rank: 49 }, '사우디아라비아': { code: 'sa', rank: 53 }, '파라과이': { code: 'py', rank: 56 }, '남아프리카 공화국': { code: 'za', rank: 59 },
            '이라크': { code: 'iq', rank: 58 }, '콩고 민주 공화국': { code: 'cd', rank: 63 }, '카보베르데': { code: 'cv', rank: 65 }, '우즈베키스탄': { code: 'uz', rank: 64 },
            '가나': { code: 'gh', rank: 68 }, '보스니아 헤르체고비나': { code: 'ba', rank: 74 }, '요르단': { code: 'jo', rank: 71 }, '파나마': { code: 'pa', rank: 45 },
            '아이티': { code: 'ht', rank: 90 }, '퀴라소': { code: 'cw', rank: 91 }, '뉴질랜드': { code: 'nz', rank: 104 }
        };

        const initialGroups = {
            A: ['멕시코', '남아프리카 공화국', '대한민국', '체코'], B: ['캐나다', '보스니아 헤르체고비나', '카타르', '스위스'],
            C: ['브라질', '모로코', '아이티', '스코틀랜드'], D: ['미국', '파라과이', '호주', '튀르키예'],
            E: ['독일', '퀴라소', '코트디부아르', '에콰도르'], F: ['네덜란드', '일본', '스웨덴', '튀니지'],
            G: ['벨기에', '이집트', '이란', '뉴질랜드'], H: ['스페인', '카보베르데', '사우디아라비아', '우루과이'],
            I: ['프랑스', '세네갈', '이라크', '노르웨이'], J: ['아르헨티나', '알제리', '오스트리아', '요르단'],
            K: ['포르투갈', '콩고 민주 공화국', '우즈베키스탄', '콜롬비아'], L: ['잉글랜드', '크로아티아', '가나', '파나마']
        };

        const wildcardSlots = [
            { idx: 0, label: "매치 1 (E조 1위 상대)", allowed: ['A', 'B', 'C', 'D', 'F'] },
            { idx: 1, label: "매치 2 (I조 1위 상대)", allowed: ['C', 'D', 'F', 'G', 'H'] },
            { idx: 2, label: "매치 7 (A조 1위 상대)", allowed: ['C', 'E', 'F', 'I', 'J'] },
            { idx: 3, label: "매치 8 (L조 1위 상대)", allowed: ['E', 'H', 'I', 'J', 'K'] },
            { idx: 4, label: "매치 11 (D조 1위 상대)", allowed: ['B', 'E', 'F', 'I', 'J'] },
            { idx: 5, label: "매치 12 (G조 1위 상대)", allowed: ['A', 'E', 'H', 'I', 'J'] },
            { idx: 6, label: "매치 15 (B조 1위 상대)", allowed: ['E', 'F', 'G', 'I', 'J'] },
            { idx: 7, label: "매치 16 (K조 1위 상대)", allowed: ['D', 'E', 'I', 'J', 'L'] }
        ];

        const stepsList = ['조별리그', '와일드카드 대진', '32강', '16강', '8강', '4강', '결승', '결과'];

        // --- 전역 상태 관리 ---
        let state = {
            step: 0,
            standings: JSON.parse(JSON.stringify(initialGroups)),
            wildcards: [],
            wildcardAssignments: new Array(8).fill(null),
            r32: [], r16: [], qf: [], sf: [],
            finals: { final: null, third: null },
            draggedItem: null
        };

        // 상태 업데이트 및 리렌더링
        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        // --- 유틸리티 및 로직 함수 ---
        function showModal(msg) {
            const modalHtml = `
                <div id="custom-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 animate-fade-in px-4">
                    <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full transform transition-all">
                        <div class="flex items-center gap-3 text-amber-500 mb-4">
                            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
                            <h3 class="font-bold text-lg text-gray-800">알림</h3>
                        </div>
                        <p class="text-gray-600 mb-6 leading-relaxed">${msg}</p>
                        <div class="text-right">
                            <button onclick="document.getElementById('custom-modal').remove()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-bold transition-colors">확인</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function getTeamGroup(teamName) {
            return Object.keys(initialGroups).find(g => state.standings[g].includes(teamName));
        }

        function isTeamEligibleForSlot(teamName, slotIdx) {
            if (!teamName) return false;
            const group = getTeamGroup(teamName);
            return wildcardSlots[slotIdx].allowed.includes(group);
        }

        function renderTeamHtml(teamName, showGroupInfo = false, align = 'center') {
            if (!teamName) return '';
            const teamInfo = teamData[teamName];
            if (!teamInfo) return `<span class="font-semibold">${teamName}</span>`;

            let groupInfoStr = "";
            if (showGroupInfo) {
                for (const [groupName, teams] of Object.entries(state.standings)) {
                    const idx = teams.indexOf(teamName);
                    if (idx !== -1) {
                        groupInfoStr = `${groupName}조 ${idx + 1}위`;
                        break;
                    }
                }
            }

            const justifyClass = align === 'start' ? 'justify-start' : align === 'end' ? 'justify-end' : 'justify-center';
            const alignClass = align === 'start' ? 'items-start' : align === 'end' ? 'items-end' : 'items-center';
            const textCenterClass = align === 'center' ? 'text-center' : 'text-left';

            return `
                <div class="flex flex-col ${alignClass} w-full overflow-hidden">
                    ${showGroupInfo && groupInfoStr ? `<span class="text-[10px] sm:text-xs px-2 py-0.5 rounded-full bg-black/10 mb-1 whitespace-nowrap">${groupInfoStr}</span>` : ''}
                    <div class="flex flex-wrap items-center ${justifyClass} gap-x-1.5 gap-y-0.5 w-full">
                        <img src="https://flagcdn.com/w40/${teamInfo.code}.png" alt="${teamName}" class="w-5 sm:w-6 h-auto border border-gray-300 shadow-sm rounded-sm shrink-0 bg-white" />
                        <span class="font-bold text-sm sm:text-base leading-tight break-keep ${textCenterClass}">${teamName}</span>
                        <span class="text-[11px] sm:text-xs font-normal opacity-80 whitespace-nowrap shrink-0">(${teamInfo.rank}위)</span>
                    </div>
                </div>
            `;
        }

        // --- 전역 이벤트 핸들러 선언 ---
        window.handleDragStart = function(e, groupName, index) {
            state.draggedItem = { groupName, index };
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => { e.target.classList.add('opacity-40'); }, 0);
        };

        window.handleDragOver = function(e) {
            e.preventDefault();
        };

        window.handleDrop = function(e, targetGroupName, targetIndex) {
            e.preventDefault();
            if (!state.draggedItem) return;
            if (state.draggedItem.groupName !== targetGroupName) return;

            const newStandings = JSON.parse(JSON.stringify(state.standings));
            const group = newStandings[targetGroupName];
            const draggedTeam = group[state.draggedItem.index];
            group.splice(state.draggedItem.index, 1);
            group.splice(targetIndex, 0, draggedTeam);

            state.draggedItem = null;
            setState({ standings: newStandings });
        };

        window.handleDragEnd = function(e) {
            e.target.classList.remove('opacity-40');
            state.draggedItem = null;
        };

        window.setStep = function(stepNum) {
            setState({ step: stepNum });
        };

        window.toggleWildcard = function(teamName) {
            let current = [...state.wildcards];
            if (current.includes(teamName)) {
                current = current.filter(t => t !== teamName);
            } else {
                if (current.length < 8) {
                    current.push(teamName);
                } else {
                    showModal("와일드카드(3위) 진출팀은 8개까지만 선택할 수 있습니다!");
                    return;
                }
            }
            // 와일드카드 목록이 바뀌면 배치 초기화
            setState({ wildcards: current, wildcardAssignments: new Array(8).fill(null) });
        };

        window.assignTeamToSlot = function(teamName, slotIdx) {
            const newAssignments = [...state.wildcardAssignments];
            const prevSlotIdx = newAssignments.indexOf(teamName);
            if (prevSlotIdx !== -1) {
                newAssignments[prevSlotIdx] = null;
            }
            newAssignments[slotIdx] = teamName;
            setState({ wildcardAssignments: newAssignments });
        };

        window.autoAssign = function() {
            if (state.wildcards.length !== 8) return;
            let used = new Array(8).fill(false);
            let matched = new Array(8).fill(null);

            const solve = (slotIdx) => {
                if (slotIdx === 8) return true;
                const allowed = wildcardSlots[slotIdx].allowed;
                for (let i = 0; i < 8; i++) {
                    if (!used[i]) {
                        const wcGroup = getTeamGroup(state.wildcards[i]);
                        if (allowed.includes(wcGroup)) {
                            used[i] = true;
                            matched[slotIdx] = state.wildcards[i];
                            if (solve(slotIdx + 1)) return true;
                            used[i] = false;
                            matched[slotIdx] = null;
                        }
                    }
                }
                return false;
            };

            if (solve(0)) {
                setState({ wildcardAssignments: matched });
            } else {
                showModal("선택하신 3위 팀들의 조합으로는 공식 피파 와일드카드 규칙에 맞는 완벽한 대진 매칭을 완성할 수 없습니다! 다른 3위 팀들을 골라보세요.");
            }
        };

        function isAssignmentComplete() {
            if (state.wildcardAssignments.includes(null)) return false;
            const uniqueAssignments = new Set(state.wildcardAssignments.filter(Boolean));
            if (uniqueAssignments.size !== 8) return false;
            return state.wildcardAssignments.every((team, idx) => isTeamEligibleForSlot(team, idx));
        }

        window.generateRound32 = function() {
            if (!isAssignmentComplete()) return;
            const getTeam = (g, rank) => state.standings[g][rank - 1];
            const wc = state.wildcardAssignments;

            const matches = [
                { id: 1, label: "매치 1", t1: getTeam('E', 1), t2: wc[0], winner: null },
                { id: 2, label: "매치 2", t1: getTeam('I', 1), t2: wc[1], winner: null },
                { id: 3, label: "매치 3", t1: getTeam('A', 2), t2: getTeam('B', 2), winner: null },
                { id: 4, label: "매치 4", t1: getTeam('F', 1), t2: getTeam('C', 2), winner: null },
                { id: 5, label: "매치 5", t1: getTeam('C', 1), t2: getTeam('F', 2), winner: null },
                { id: 6, label: "매치 6", t1: getTeam('E', 2), t2: getTeam('I', 2), winner: null },
                { id: 7, label: "매치 7", t1: getTeam('A', 1), t2: wc[2], winner: null },
                { id: 8, label: "매치 8", t1: getTeam('L', 1), t2: wc[3], winner: null },
                { id: 9, label: "매치 9", t1: getTeam('K', 2), t2: getTeam('L', 2), winner: null },
                { id: 10, label: "매치 10", t1: getTeam('H', 1), t2: getTeam('J', 2), winner: null },
                { id: 11, label: "매치 11", t1: getTeam('D', 1), t2: wc[4], winner: null },
                { id: 12, label: "매치 12", t1: getTeam('G', 1), t2: wc[5], winner: null },
                { id: 13, label: "매치 13", t1: getTeam('J', 1), t2: getTeam('H', 2), winner: null },
                { id: 14, label: "매치 14", t1: getTeam('D', 2), t2: getTeam('G', 2), winner: null },
                { id: 15, label: "매치 15", t1: getTeam('B', 1), t2: wc[6], winner: null },
                { id: 16, label: "매치 16", t1: getTeam('K', 1), t2: wc[7], winner: null },
            ];
            setState({ r32: matches, step: 2 });
        };

        function generateNextRoundMatches(prevRoundMatches) {
            const nextRound = [];
            for (let i = 0; i < prevRoundMatches.length; i += 2) {
                nextRound.push({
                    id: `M_${prevRoundMatches[i].id}_${prevRoundMatches[i+1].id}`,
                    label: `${prevRoundMatches[i].label.split(' ')[1]}·${prevRoundMatches[i+1].label.split(' ')[1]} 승자전`,
                    t1: prevRoundMatches[i].winner,
                    t2: prevRoundMatches[i+1].winner,
                    winner: null
                });
            }
            return nextRound;
        }

        window.handleMatchWinner = function(roundKey, matchId, winnerTeam) {
            const currentMatches = [...state[roundKey]];
            const newMatches = currentMatches.map(m => m.id === matchId ? { ...m, winner: winnerTeam } : m);
            setState({ [roundKey]: newMatches });
        };

        window.handleFinalsWinner = function(matchType, winnerTeam) {
            setState({
                finals: {
                    ...state.finals,
                    [matchType]: { ...state.finals[matchType], winner: winnerTeam }
                }
            });
        };

        window.goToNextRound = function() {
            if (state.step === 2) { setState({ r16: generateNextRoundMatches(state.r32), step: 3 }); }
            else if (state.step === 3) { setState({ qf: generateNextRoundMatches(state.r16), step: 4 }); }
            else if (state.step === 4) { setState({ sf: generateNextRoundMatches(state.qf), step: 5 }); }
            else if (state.step === 5) {
                setState({
                    finals: {
                        final: { id: 'F1', label: '결승전', t1: state.sf[0].winner, t2: state.sf[1].winner, winner: null },
                        third: { id: 'T1', label: '3위 결정전', t1: state.sf[0].t1 === state.sf[0].winner ? state.sf[0].t2 : state.sf[0].t1, t2: state.sf[1].t1 === state.sf[1].winner ? state.sf[1].t2 : state.sf[1].t1, winner: null }
                    },
                    step: 6
                });
            } else if (state.step === 6) {
                setState({ step: 7 });
            }
        };

        window.resetApp = function() {
            setState({
                step: 0,
                standings: JSON.parse(JSON.stringify(initialGroups)),
                wildcards: [],
                wildcardAssignments: new Array(8).fill(null),
                r32: [], r16: [], qf: [], sf: [],
                finals: { final: null, third: null }
            });
        };

        // --- 렌더링 함수들 ---
        function renderHeaderAndSteps() {
            let html = `
                <header class="bg-blue-900 text-white p-6 shadow-md text-center">
                    <h1 class="text-3xl md:text-4xl font-extrabold flex items-center justify-center gap-3">
                        <i class="fa-solid fa-trophy text-yellow-300"></i>
                        2026 FIFA 월드컵 시뮬레이터
                    </h1>
                    <p class="mt-2 text-blue-100 font-medium">공식 피파 대진표 규칙에 맞춰 나만의 대진을 완성하세요!</p>
                </header>
                <div class="max-w-6xl mx-auto px-4 py-6">
                    <div class="flex flex-wrap justify-center gap-2 mb-8">
            `;
            stepsList.forEach((s, idx) => {
                const colors = state.step === idx ? 'bg-blue-600 text-white' : state.step > idx ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500';
                html += `<span class="px-3 py-1 rounded-full text-sm font-bold transition-colors ${colors}">${idx + 1}. ${s}</span>`;
            });
            html += `</div>`;
            return html;
        }

        function renderStep0() {
            let html = `
                <div class="animate-fade-in">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold">1단계: 조별 리그 순위 결정</h2>
                        <p class="text-gray-600 mt-2 bg-yellow-100 inline-block px-4 py-1 rounded-lg">각 조 안에서 팀을 <strong class="text-black">드래그(Drag)</strong>하여 최종 순위로 나열하세요!</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            `;
            for (const [groupName, teams] of Object.entries(state.standings)) {
                html += `
                    <div class="bg-white rounded-xl shadow border-t-4 border-blue-900 overflow-hidden">
                        <div class="bg-black text-white text-center font-bold py-2">GROUP ${groupName}</div>
                        <ul class="p-3 space-y-2">
                `;
                teams.forEach((team, idx) => {
                    const badgeColor = idx < 2 ? 'bg-blue-100 text-blue-700' : idx === 2 ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-500';
                    html += `
                        <li draggable="true"
                            ondragstart="handleDragStart(event, '${groupName}', ${idx})"
                            ondragover="handleDragOver(event)"
                            ondrop="handleDrop(event, '${groupName}', ${idx})"
                            ondragend="handleDragEnd(event)"
                            class="flex items-center bg-gray-50 p-2 rounded border border-gray-200 cursor-grab active:cursor-grabbing hover:bg-gray-100 transition-colors">
                            <span class="font-bold w-6 h-6 flex items-center justify-center rounded text-sm shrink-0 ${badgeColor}">${idx + 1}</span>
                            <div class="flex-1 ml-3 pointer-events-none flex items-center h-full overflow-hidden">
                                ${renderTeamHtml(team, false, 'start')}
                            </div>
                        </li>
                    `;
                });
                html += `</ul></div>`;
            }
            html += `
                    </div>
                    <div class="text-center mt-8">
                        <button onclick="setStep(1)" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold text-lg inline-flex items-center gap-2 shadow-lg transition-transform hover:scale-105">
                            순위 확정하고 다음으로 <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
            return html;
        }

        function renderStep1() {
            let html = `
                <div class="animate-fade-in max-w-6xl mx-auto space-y-12">
                    <div class="bg-white p-6 rounded-2xl shadow border border-gray-200">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold">2단계 (A): 와일드카드 (3위 진출팀) 선택</h2>
                            <p class="text-gray-600">조 3위를 기록한 12개 국가 중 성적이 가장 좋은 8개 국가를 선택하세요.</p>
                            <div class="mt-4 inline-block bg-blue-100 text-blue-800 px-6 py-2 rounded-full font-extrabold text-xl">
                                선택된 팀: ${state.wildcards.length} / 8
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            `;
            for (const [g, teams] of Object.entries(state.standings)) {
                const team3rd = teams[2];
                const isSelected = state.wildcards.includes(team3rd);
                const btnClass = isSelected ? 'bg-green-500 border-green-600 text-white scale-105' : 'bg-white border-gray-200 text-gray-700 hover:border-green-300';
                const badgeClass = isSelected ? 'bg-green-600' : 'bg-gray-100';
                html += `
                    <button onclick="toggleWildcard('${team3rd}')" class="p-2 sm:p-3 rounded-xl font-bold border-2 transition-all shadow-sm flex flex-col items-center justify-center gap-1.5 w-full overflow-hidden ${btnClass}">
                        <div class="text-[10px] sm:text-[11px] font-normal px-2 py-0.5 rounded-full whitespace-nowrap shrink-0 ${badgeClass}">${g}조 3위</div>
                        <div class="w-full flex justify-center items-center">
                            ${renderTeamHtml(team3rd, false, 'center')}
                        </div>
                    </button>
                `;
            }
            html += `</div></div>`;

            if (state.wildcards.length === 8) {
                html += `
                    <div class="bg-white p-6 rounded-2xl shadow border border-gray-200 space-y-6">
                        <div class="text-center max-w-2xl mx-auto space-y-2">
                            <h2 class="text-2xl font-bold text-blue-900">2단계 (B): 와일드카드 32강 상대 대진 직접 지정</h2>
                            <p class="text-gray-600 text-sm">각 대진 매치에 어울릴 상대를 골라주세요. <br />각 슬롯마다 피파 공식 규칙에 맞는 <strong class="text-blue-600">허용된 조의 3위 팀</strong>들만 선택할 수 있습니다.</p>
                            <div class="pt-2">
                                <button onclick="autoAssign()" class="inline-flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-5 py-2.5 rounded-lg shadow transition">
                                    <i class="fa-solid fa-shuffle"></i> 자동으로 대진 추천 배치하기
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                `;
                
                wildcardSlots.forEach(slot => {
                    const eligibleSelectedTeams = state.wildcards.filter(team => isTeamEligibleForSlot(team, slot.idx));
                    const assignedTeam = state.wildcardAssignments[slot.idx];
                    const slotClass = assignedTeam ? 'border-blue-200 bg-blue-50/40' : 'border-dashed border-gray-300';
                    
                    html += `
                        <div class="p-4 rounded-xl border-2 transition ${slotClass}">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="text-xs font-bold text-gray-400 block">SLOT ${slot.idx + 1}</span>
                                    <h4 class="font-bold text-gray-800 text-base">${slot.label}</h4>
                                </div>
                                <span class="text-[10px] bg-gray-200 px-2 py-0.5 rounded text-gray-600 font-semibold uppercase">허용 조: ${slot.allowed.join(', ')}</span>
                            </div>
                            <div class="flex flex-wrap gap-2 mb-3">
                    `;

                    if (eligibleSelectedTeams.length > 0) {
                        eligibleSelectedTeams.forEach(team => {
                            const isThisAssigned = assignedTeam === team;
                            const isAssignedElsewhere = state.wildcardAssignments.includes(team) && !isThisAssigned;
                            const btnCls = isThisAssigned ? 'bg-blue-600 border-blue-700 text-white shadow-sm' : isAssignedElsewhere ? 'bg-gray-100 border-gray-200 text-gray-400 opacity-60 hover:bg-gray-200' : 'bg-white border-gray-300 hover:border-blue-500 text-gray-700';
                            
                            html += `<button onclick="assignTeamToSlot('${team}', ${slot.idx})" class="px-3 py-1.5 rounded-lg text-xs font-bold border flex items-center gap-1.5 transition ${btnCls}">${team} (${getTeamGroup(team)}조) ${isAssignedElsewhere ? '<span class="text-[9px] font-normal text-gray-500">(이동)</span>' : ''}</button>`;
                        });
                    } else {
                        html += `<span class="text-xs text-red-500 font-semibold flex items-center gap-1 py-1"><i class="fa-solid fa-triangle-exclamation"></i> 현재 선택하신 3위 국가들 중에 이 자리에 배치 가능한 국가가 없습니다.</span>`;
                    }

                    html += `
                            </div>
                            <div class="text-sm font-bold flex items-center gap-2 bg-white p-2 rounded border border-gray-200 justify-between w-full overflow-hidden">
                                <span class="text-xs text-gray-500 shrink-0">배치된 대진 상대:</span>
                                ${assignedTeam ? `<div class="flex items-center gap-2 text-blue-700 w-full overflow-hidden">${renderTeamHtml(assignedTeam, false, 'start')}</div>` : `<span class="text-xs text-amber-500 italic font-medium flex items-center gap-1"><i class="fa-solid fa-circle-question"></i> 미지정 (후보군 선택)</span>`}
                            </div>
                        </div>
                    `;
                });

                const completeBtnStatus = isAssignmentComplete() ? '' : 'disabled class="opacity-50 cursor-not-allowed"';
                const completeBtnClass = isAssignmentComplete() ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-300';
                
                html += `
                        </div>
                    </div>
                `;
            }

            html += `
                    <div class="text-center mt-8 flex flex-wrap justify-center gap-4">
                        <button onclick="setStep(0)" class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-3 rounded-full font-bold transition-transform hover:scale-105">이전 단계로</button>
                        <button onclick="generateRound32()" ${!isAssignmentComplete() ? 'disabled' : ''} class="${isAssignmentComplete() ? 'bg-blue-600 hover:bg-blue-700 hover:scale-105' : 'bg-blue-300'} text-white px-8 py-3 rounded-full font-bold text-lg inline-flex items-center gap-2 shadow-lg transition-transform">
                            32강 공식 대진 확정 <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
            return html;
        }

        function renderTournament() {
            let roundData, roundKey, roundName;
            if (state.step === 2) { roundData = state.r32; roundKey = 'r32'; roundName = "32강전"; }
            else if (state.step === 3) { roundData = state.r16; roundKey = 'r16'; roundName = "16강전"; }
            else if (state.step === 4) { roundData = state.qf; roundKey = 'qf'; roundName = "8강전"; }
            else { roundData = state.sf; roundKey = 'sf'; roundName = "4강전"; }

            const allMatchesDone = roundData.every(m => m.winner !== null);

            let html = `
                <div class="animate-fade-in max-w-4xl mx-auto">
                    <div class="text-center mb-8">
                        <h2 class="text-3xl font-extrabold text-blue-900">${roundName}</h2>
                        <p class="text-gray-600 mt-2">다음 라운드로 진출시킬 승리 팀을 탭(클릭)하세요!</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            roundData.forEach(m => {
                const btn1Class = m.winner === m.t1 ? 'bg-blue-600 text-white' : 'bg-white hover:bg-gray-50 text-gray-800';
                const btn2Class = m.winner === m.t2 ? 'bg-red-600 text-white' : 'bg-white hover:bg-gray-50 text-gray-800';
                
                html += `
                    <div class="flex flex-col bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
                        <div class="bg-gray-100 px-4 py-1 text-xs font-bold text-gray-500 border-b border-gray-200 flex justify-between">
                            <span>${m.label}</span>
                            ${m.winner ? '<span class="text-blue-600">진출 확정</span>' : ''}
                        </div>
                        <div class="flex items-stretch justify-between h-full">
                            <button onclick="handleMatchWinner('${roundKey}', '${m.id}', '${m.t1}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-4 w-full overflow-hidden text-sm sm:text-base font-bold transition-colors ${btn1Class}">
                                ${renderTeamHtml(m.t1, true, 'center')}
                            </button>
                            <div class="w-8 sm:w-10 flex items-center justify-center bg-gray-50 border-x border-gray-100 font-black text-gray-300 italic text-xs shrink-0">VS</div>
                            <button onclick="handleMatchWinner('${roundKey}', '${m.id}', '${m.t2}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-4 w-full overflow-hidden text-sm sm:text-base font-bold transition-colors ${btn2Class}">
                                ${renderTeamHtml(m.t2, true, 'center')}
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                    <div class="text-center mt-10 flex flex-wrap justify-center gap-4">
                        <button onclick="setStep(${state.step - 1})" class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-4 rounded-full font-bold text-lg shadow-md transition-transform hover:scale-105">이전 단계로</button>
                        <button onclick="goToNextRound()" ${!allMatchesDone ? 'disabled' : ''} class="${allMatchesDone ? 'bg-yellow-500 hover:bg-yellow-600 hover:scale-105' : 'bg-gray-300'} text-white px-8 py-4 rounded-full font-extrabold text-xl inline-flex items-center gap-2 shadow-lg transition-transform">
                            ${allMatchesDone ? '다음 라운드 진행' : '모든 매치의 승자를 골라주세요'} <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
            return html;
        }

        function renderFinals() {
            const f = state.finals;
            const finalBtn1 = f.final.winner === f.final.t1 ? 'bg-yellow-500 text-white' : 'bg-white hover:bg-gray-50';
            const finalBtn2 = f.final.winner === f.final.t2 ? 'bg-yellow-500 text-white' : 'bg-white hover:bg-gray-50';
            const thirdBtn1 = f.third.winner === f.third.t1 ? 'bg-gray-500 text-white' : 'bg-white hover:bg-gray-50';
            const thirdBtn2 = f.third.winner === f.third.t2 ? 'bg-gray-500 text-white' : 'bg-white hover:bg-gray-50';
            const isReady = f.final.winner && f.third.winner;

            return `
                <div class="animate-fade-in max-w-3xl mx-auto">
                    <div class="text-center mb-10">
                        <h2 class="text-4xl font-extrabold text-yellow-600 flex justify-center gap-2"><i class="fa-solid fa-trophy"></i> 대망의 결승전 <i class="fa-solid fa-trophy"></i></h2>
                    </div>
                    <div class="bg-yellow-50 p-4 sm:p-6 rounded-2xl shadow-xl border-2 border-yellow-400 mb-8">
                        <h3 class="text-center font-bold text-xl mb-4 text-yellow-800">우승팀 결정</h3>
                        <div class="flex items-stretch justify-between bg-white rounded-xl shadow overflow-hidden">
                            <button onclick="handleFinalsWinner('final', '${f.final.t1}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-6 w-full overflow-hidden text-base sm:text-xl font-bold transition ${finalBtn1}">
                                ${renderTeamHtml(f.final.t1, true, 'center')}
                            </button>
                            <div class="w-10 sm:w-12 flex items-center justify-center bg-gray-50 border-x font-black text-gray-300 text-xs sm:text-sm shrink-0">VS</div>
                            <button onclick="handleFinalsWinner('final', '${f.final.t2}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-6 w-full overflow-hidden text-base sm:text-xl font-bold transition ${finalBtn2}">
                                ${renderTeamHtml(f.final.t2, true, 'center')}
                            </button>
                        </div>
                    </div>
                    <div class="bg-gray-100 p-4 sm:p-6 rounded-2xl shadow-md border border-gray-300">
                        <h3 class="text-center font-bold text-lg mb-4 text-gray-600">3위 결정전</h3>
                        <div class="flex items-stretch justify-between bg-white rounded-xl shadow overflow-hidden">
                            <button onclick="handleFinalsWinner('third', '${f.third.t1}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-4 w-full overflow-hidden text-base sm:text-lg font-bold transition ${thirdBtn1}">
                                ${renderTeamHtml(f.third.t1, true, 'center')}
                            </button>
                            <div class="w-10 sm:w-12 flex items-center justify-center bg-gray-50 border-x font-black text-gray-300 text-xs sm:text-sm shrink-0">VS</div>
                            <button onclick="handleFinalsWinner('third', '${f.third.t2}')" class="flex-1 flex flex-col items-center justify-center p-3 sm:p-4 w-full overflow-hidden text-base sm:text-lg font-bold transition ${thirdBtn2}">
                                ${renderTeamHtml(f.third.t2, true, 'center')}
                            </button>
                        </div>
                    </div>
                    <div class="text-center mt-10 flex flex-wrap justify-center gap-4">
                        <button onclick="setStep(5)" class="bg-gray-400 hover:bg-gray-500 text-white px-8 py-4 rounded-full font-bold text-xl shadow-md transition-transform hover:scale-105">이전 단계로</button>
                        <button onclick="goToNextRound()" ${!isReady ? 'disabled' : ''} class="${isReady ? 'bg-blue-600 hover:bg-blue-700 hover:scale-110' : 'bg-gray-300'} text-white px-10 py-4 rounded-full font-extrabold text-2xl shadow-xl transition-transform">최종 결과 확인하기</button>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            const f = state.finals;
            const firstPlace = f.final.winner;
            const secondPlace = f.final.t1 === firstPlace ? f.final.t2 : f.final.t1;
            const thirdPlace = f.third.winner;
            const fourthPlace = f.third.t1 === thirdPlace ? f.third.t2 : f.third.t1;

            return `
                <div class="animate-fade-in max-w-4xl mx-auto text-center">
                    <h2 class="text-4xl font-black mb-12 text-blue-900">🎉 2026 월드컵 최종 예측 결과 🎉</h2>
                    <div class="flex flex-col md:flex-row justify-center items-end gap-4 md:gap-8 mb-16 h-64 mt-20">
                        
                        <!-- 2위 -->
                        <div class="w-full md:w-1/3 flex flex-col items-center order-2 md:order-1 overflow-hidden">
                            <div class="text-xl md:text-2xl font-bold mb-2 w-full">${renderTeamHtml(secondPlace, false, 'center')}</div>
                            <div class="w-full bg-gray-300 h-32 rounded-t-xl flex justify-center pt-4 shadow-inner">
                                <i class="fa-solid fa-medal text-gray-500 text-4xl"></i>
                            </div>
                            <div class="bg-gray-400 text-white w-full py-1 font-bold">2위</div>
                        </div>
                        
                        <!-- 1위 -->
                        <div class="w-full md:w-1/3 flex flex-col items-center order-1 md:order-2 z-10 -mt-10 overflow-hidden">
                            <i class="fa-solid fa-trophy text-yellow-500 mb-2 text-6xl animate-bounce-slow"></i>
                            <div class="text-2xl md:text-3xl font-black text-red-600 mb-2 w-full">${renderTeamHtml(firstPlace, false, 'center')}</div>
                            <div class="w-full bg-yellow-400 h-48 rounded-t-xl flex justify-center pt-4 shadow-2xl">
                                <span class="text-yellow-700 font-black text-2xl">WINNER</span>
                            </div>
                            <div class="bg-yellow-600 text-white w-full py-2 font-black text-xl">1위 (우승)</div>
                        </div>

                        <!-- 3위 -->
                        <div class="w-full md:w-1/3 flex flex-col items-center order-3 md:order-3 overflow-hidden">
                            <div class="text-lg md:text-xl font-bold mb-2 w-full">${renderTeamHtml(thirdPlace, false, 'center')}</div>
                            <div class="w-full bg-orange-300 h-24 rounded-t-xl flex justify-center pt-2 shadow-inner">
                                <i class="fa-solid fa-medal text-orange-700 text-3xl"></i>
                            </div>
                            <div class="bg-orange-500 text-white w-full py-1 font-bold">3위</div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow flex flex-wrap justify-center items-center gap-2 border text-lg mt-8 mx-auto w-full max-w-sm overflow-hidden">
                        <span class="font-bold text-gray-500 shrink-0">4위</span>
                        <div class="flex-1">${renderTeamHtml(fourthPlace, false, 'start')}</div>
                    </div>

                    <div class="mt-16 flex flex-wrap justify-center gap-4">
                        <button onclick="setStep(6)" class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-3 rounded-full font-bold inline-flex items-center gap-2 transition-transform hover:scale-105">이전 단계로</button>
                        <button onclick="resetApp()" class="bg-gray-800 hover:bg-black text-white px-6 py-3 rounded-full font-bold inline-flex items-center gap-2 transition-transform hover:scale-105">
                            <i class="fa-solid fa-rotate-left"></i> 처음부터 다시 예측하기
                        </button>
                    </div>
                </div>
            `;
        }

        // 메인 렌더 함수
        function render() {
            const app = document.getElementById('app');
            let content = renderHeaderAndSteps();
            
            if (state.step === 0) content += renderStep0();
            else if (state.step === 1) content += renderStep1();
            else if (state.step >= 2 && state.step <= 5) content += renderTournament();
            else if (state.step === 6) content += renderFinals();
            else if (state.step === 7) content += renderResults();

            content += `</div>`; // 닫기 (max-w-6xl mx-auto px-4 py-6)
            app.innerHTML = content;
        }

        // 초기 렌더링 시작
        render();
    </script>
</body>
</html>
